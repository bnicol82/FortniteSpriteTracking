<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Sprite Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Burbank+Big+Condensed:wght@800&display=swap');
        .fortnite-font { font-family: 'Burbank Big Condensed', sans-serif; }
        .owned-btn { background: #262626; color: #a3a3a3; border: 1px solid #404040; }
        .owned-btn.active { background: #22c55e !important; color: white; border-color: #16a34a; }
        /* Ensure the captured area has a fixed background and padding */
        #capture-wrapper { background-color: #0a0a0a; padding: 20px; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200">

    <div class="p-4 flex gap-2">
        <button onclick="exportData()" class="bg-gray-700 px-4 py-2 rounded text-xs font-bold">EXPORT</button>
        <button onclick="importData()" class="bg-gray-700 px-4 py-2 rounded text-xs font-bold">IMPORT</button>
        <button onclick="saveToPhotos()" class="bg-blue-600 px-4 py-2 rounded text-xs font-bold">SAVE FULL IMAGE</button>
    </div>

    <div id="capture-wrapper">
        <header class="mb-8 text-center">
            <h1 class="fortnite-font text-5xl text-white uppercase italic">Fortnite Sprite Tracker</h1>
            <p class="text-sm font-bold text-gray-400" id="stats">0 / 61 Collected (0%)</p>
        </header>

        <div id="grid" class="grid grid-cols-6 gap-3">
            </div>
    </div>

    <script>
        // ... (Keep your spriteData array here exactly as it was) ...
        const spriteData = [ /* ... your data ... */ ]; 
        
        let state = JSON.parse(localStorage.getItem('fnSpriteTracker61')) || {};

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let count = 0;
            spriteData.forEach(item => {
                if (state[item.file]) count++;
                const card = document.createElement('div');
                card.className = "bg-[#171717] p-2 rounded-lg border border-white/5 text-center";
                card.innerHTML = `
                    <div class="bg-black/40 aspect-square rounded mb-1 p-1">
                        <img src="images/${item.file}" class="w-full h-full object-contain">
                    </div>
                    <p class="text-[8px] font-bold text-gray-300 truncate">${item.file.replace('.JPG', '').replace(/_/g, ' ')}</p>
                    <p class="text-[7px] text-gray-500 uppercase">${item.rarity}</p>
                    <button onclick="toggle('${item.file}')" class="mt-1 owned-btn w-full py-0.5 text-[7px] uppercase font-bold rounded ${state[item.file] ? 'active' : ''}">
                        ${state[item.file] ? 'Owned' : 'Not'}
                    </button>
                `;
                grid.appendChild(card);
            });
            document.getElementById('stats').innerText = `${count} / ${spriteData.length} Collected (${Math.round((count / spriteData.length) * 100)}%)`;
        }

        function saveToPhotos() {
            const btn = event.target;
            btn.innerText = "Generating...";
            // We capture the wrapper, not just the grid
            html2canvas(document.getElementById('capture-wrapper'), { 
                backgroundColor: "#0a0a0a",
                scale: 2 // Increases quality
            }).then(canvas => {
                const dataURL = canvas.toDataURL("image/png");
                const newTab = window.open();
                newTab.document.write(`<img src="${dataURL}" style="width:100%">`);
                btn.innerText = "SAVE FULL IMAGE";
            });
        }
        
        // ... (Keep your toggle, exportData, and importData functions here) ...
    </script>
</body>
</html>
