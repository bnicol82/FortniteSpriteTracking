<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Sprite Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { 
                        bgMain: '#0a0a0a', 
                        bgCard: '#171717',
                        accent: '#3b82f6'
                    } 
                } 
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: 'Montserrat', sans-serif; }
        /* Sleek Apple-inspired dark mode toggle button */
        .owned-btn {
            background-color: #262626;
            color: #a3a3a3;
            border: 1px solid #404040;
        }
        .owned-btn:hover {
            background-color: #333333;
        }
        .owned-btn.active { 
            background-color: #22c55e !important; 
            color: #ffffff; 
            border-color: #16a34a;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>
<body class="pb-12 antialiased">

    <header class="sticky top-0 z-50 bg-[#0a0a0a]/80 backdrop-blur-lg p-4 border-b border-white/10">
        <div class="max-w-6xl mx-auto flex justify-between items-center gap-4">
            <div>
                <h1 class="text-xl sm:text-2xl font-bold uppercase tracking-widest text-white">Sprite Collection</h1>
                <p class="text-xs sm:text-sm text-gray-400 font-medium" id="stats">0 / 61 Collected (0%)</p>
            </div>
            <button onclick="saveToPhotos()" id="save-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-md text-xs sm:text-sm font-bold uppercase tracking-wide transition shadow-lg">Save Image</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-4">
        <div id="capture-area" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 bg-bgMain p-2 sm:p-0">
            </div>
    </main>

    <script>
        // Exact list of 61 corrected filenames
        const fileNames = [
            "Aura_Sprite.JPG",
            "Boss_Sprite.JPG",
            "Burnt_Peanut.JPG",
            "Demon_Sprite.JPG",
            "Dream_Sprite.JPG",
            "Duck_Sprite.JPG",
            "Earth_Sprite.JPG",
            "Fire_Sprite.JPG",
            "Fishy_Sprite.JPG",
            "Galaxy_Aura_Sprite.JPG",
            "Galaxy_Boss_Sprite.JPG",
            "Galaxy_Demon_Sprite.JPG",
            "Galaxy_Dream_Sprite.JPG",
            "Galaxy_Duck_Sprite.JPG",
            "Galaxy_Earth_Sprite.JPG",
            "Galaxy_Fire_Sprite.JPG",
            "Galaxy_Fishy_Sprite.JPG",
            "Galaxy_Ghost_Sprite.JPG",
            "Galaxy_Grim_Sprite.JPG",
            "Galaxy_King_Sprite.JPG",
            "Galaxy_Punk_Sprite.JPG",
            "Galaxy_Striker_Sprite.JPG",
            "Galaxy_Water_Sprite.JPG",
            "Galaxy_Zero_Point_Sprite.JPG",
            "Ghost_Sprite.JPG",
            "Gold_Aura_Sprite.JPG",
            "Gold_Boss_Sprite.JPG",
            "Gold_Demon_Sprite.JPG",
            "Gold_Dream_Sprite.JPG",
            "Gold_Duck_Sprite.JPG",
            "Gold_Earth_Sprite.JPG",
            "Gold_Fire_Sprite.JPG",
            "Gold_Fishy_Sprite.JPG",
            "Gold_Ghost_Sprite.JPG",
            "Gold_Grim_Sprite.JPG",
            "Gold_King_Sprite.JPG",
            "Gold_Punk_Sprite.JPG",
            "Gold_Striker_Sprite.JPG",
            "Gold_Water_Sprite.JPG",
            "Gold_Zero_Point_Sprite.JPG",
            "Grim_Sprite.JPG",
            "Gummy_Aura_Sprite.JPG",
            "Gummy_Boss_Sprite.JPG",
            "Gummy_Demon_Sprite.JPG",
            "Gummy_Dream_Sprite.JPG",
            "Gummy_Earth_Sprite.JPG",
            "Gummy_Fishy_Sprite.JPG",
            "Gummy_Ghost_Sprite.JPG",
            "Gummy_Grim_Sprite.JPG",
            "Gummy_King_Sprite.JPG",
            "Gummy_Punk_Sprite.JPG",
            "Gummy_Striker_Sprite.JPG",
            "Gummy_Water_Sprite.JPG",
            "Gummy_Zero_Point_Sprite.JPG",
            "Gummy_Duck_Sprite.JPG",
            "Gummy_Fire_Sprite.JPG",
            "King_Sprite.JPG",
            "Punk_Sprite.JPG",
            "Striker_Sprite.JPG",
            "Water_Sprite.JPG",
            "Zero_Point_Sprite.JPG"
        ];

        const totalCollectibles = fileNames.length;
        let state = JSON.parse(localStorage.getItem('fnSpriteTracker61')) || {};

        function render() {
            const grid = document.getElementById('capture-area');
            grid.innerHTML = '';
            let count = 0;

            fileNames.forEach((fileName) => {
                const uniqueId = fileName; 
                
                if (state[uniqueId]) count++;
                const isOwned = state[uniqueId] ? 'active' : '';
                
                // FORMATTING: Removes .JPG (case-insensitive) and replaces underscores with spaces
                const displayName = fileName.replace(/\.jpg$/i, '').replace(/_/g, ' ');
                
                const imagePath = `images/${fileName}`;
                const fallbackImage = `https://placehold.co/200x200/171717/333333?text=MISSING&font=oswald`;

                const card = document.createElement('div');
                card.className = "bg-bgCard p-3 rounded-xl border border-white/5 text-center flex flex-col justify-between shadow-sm hover:shadow-md transition-all duration-300";
                card.innerHTML = `
                    <div>
                        <div class="bg-black/40 aspect-square rounded-lg mb-3 flex items-center justify-center p-2 overflow-hidden">
                            <img src="${imagePath}" onerror="this.src='${fallbackImage}'" alt="${displayName}" class="max-w-full max-h-full object-contain drop-shadow-lg hover:scale-110 transition-transform duration-300">
                        </div>
                        <p class="text-[11px] sm:text-xs font-bold mb-3 text-gray-200 leading-tight h-8 flex items-center justify-center">${displayName}</p>
                    </div>
                    <button onclick="toggle('${uniqueId}')" class="owned-btn w-full py-2 text-[10px] sm:text-xs uppercase font-bold rounded-md transition-all duration-200 ${isOwned}">
                        ${state[uniqueId] ? 'Owned' : 'Not Owned'}
                    </button>
                `;
                grid.appendChild(card);
            });

            const percent = totalCollectibles > 0 ? Math.round((count / totalCollectibles) * 100) : 0;
            document.getElementById('stats').innerText = `${count} / ${totalCollectibles} Collected (${percent}%)`;
        }

        function toggle(id) {
            state[id] = !state[id];
            localStorage.setItem('fnSpriteTracker61', JSON.stringify(state));
            render();
        }

        function saveToPhotos() {
            const btn = document.getElementById('save-btn');
            const originalText = btn.innerText;
            btn.innerText = "Capturing...";

            html2canvas(document.getElementById('capture-area'), {
                backgroundColor: "#0a0a0a",
                scale: 2,
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'My_Sprite_Collection.png';
                link.href = canvas.toDataURL();
                link.click();
                btn.innerText = originalText;
            }).catch(err => {
                console.error(err);
                alert("Failed to save image.");
                btn.innerText = originalText;
            });
        }

        render();
    </script>
</body>
</html>
