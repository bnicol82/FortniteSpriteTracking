<div class="flex gap-2">
    <button onclick="exportData()" class="bg-gray-700 text-white px-3 py-2 rounded text-xs">Export Code</button>
    <button onclick="importData()" class="bg-gray-700 text-white px-3 py-2 rounded text-xs">Import Code</button>
</div>

<script>
    // 1. Grouped Data (Organized by Sprite Type)
    const spriteData = [
        // Water Sprites
        { file: "Water_Sprite.JPG", rarity: "Rare", chance: "12.83%" },
        { file: "Gold_Water_Sprite.JPG", rarity: "Special", chance: "0.7%" },
        { file: "Gummy_Water_Sprite.JPG", rarity: "Special", chance: "0.28%" },
        { file: "Galaxy_Water_Sprite.JPG", rarity: "Special", chance: "0.28%" },
        
        // Earth Sprites
        { file: "Earth_Sprite.JPG", rarity: "Rare", chance: "12.83%" },
        { file: "Gold_Earth_Sprite.JPG", rarity: "Special", chance: "0.7%" },
        { file: "Gummy_Earth_Sprite.JPG", rarity: "Special", chance: "0.28%" },
        { file: "Galaxy_Earth_Sprite.JPG", rarity: "Special", chance: "0.28%" },
        
        // ... (Continue this pattern for all groups: Fire, Duck, Ghost, Dream, Demon, Punk, King, Zero Point, Fishy, Striker, Aura, Boss, Grim)
    ];

    // 2. Import/Export Logic
    function exportData() {
        const dataStr = btoa(JSON.stringify(state)); // Encodes to a base64 string
        prompt("Copy this code to save your progress:", dataStr);
    }

    function importData() {
        const code = prompt("Paste your saved code here:");
        if (code) {
            state = JSON.parse(atob(code));
            localStorage.setItem('fnSpriteTracker61', JSON.stringify(state));
            render();
        }
    }
</script>
