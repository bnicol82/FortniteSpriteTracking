<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sprites">
    <title>Fortnite Sprite Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
        * { -webkit-tap-highlight-color: transparent; }
        body { padding-bottom: env(safe-area-inset-bottom); }
        .fn-title { font-family: 'Anton', 'Arial Narrow', sans-serif; letter-spacing: 0.5px; }

        .sprite-card { background: #1a1a1a; transition: transform .12s ease, box-shadow .12s ease; border-bottom: 4px solid #333; touch-action: manipulation; }
        .sprite-card, .sprite-card * { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        .sprite-card:active { transform: scale(0.95); }
        .sprite-img { pointer-events: none; }
        .is-owned { box-shadow: inset 0 0 0 2px #16a34a; }
        .check-badge { position: absolute; top: 6px; right: 6px; width: 18px; height: 18px; background: #16a34a; color: #fff; border-radius: 9999px; font-size: 11px; line-height: 18px; font-weight: 800; box-shadow: 0 1px 4px rgba(0,0,0,.5); }
        .status-pill { display: block; margin-top: 4px; padding: 3px 0; font-size: 8px; text-transform: uppercase; font-weight: 800; border-radius: 6px; letter-spacing: .04em; }

        /* Rarity Colors */
        .col-Rare { color: #3b82f6; border-color: #3b82f6; }
        .col-Epic { color: #a855f7; border-color: #a855f7; }
        .col-Legendary { color: #eab308; border-color: #eab308; }
        .col-Mythic { color: #f97316; border-color: #f97316; }
        .col-Special { color: #fde047; border-color: #ffffff; }

        /* Segmented + chip controls */
        .seg-btn { flex: 1; padding: 8px 0; font-size: 11px; font-weight: 800; text-transform: uppercase; border-radius: 8px; color: #9ca3af; transition: all .15s ease; }
        .seg-btn.active { background: #eab308; color: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Rarity rings */
        .ring-btn { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 6px; border-radius: 12px; opacity: .65; transition: all .15s ease; }
        .ring-btn.active { opacity: 1; background: #1a1a1a; }
        .ring-name { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #cbd5e1; }
        .ring-count { font-size: 9px; font-weight: 700; color: #6b7280; }
        .ring-all-circle { width: 38px; height: 38px; border-radius: 9999px; border: 4px solid #4b5563; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; }

        /* Set cards */
        .set-card { background: #141414; border: 1px solid #232323; border-radius: 14px; padding: 10px; }
        .set-card.complete { border-color: #eab308; box-shadow: inset 0 0 0 1px #eab308; }
        .rarity-badge { font-size: 8px; text-transform: uppercase; font-weight: 800; padding: 2px 6px; border-radius: 6px; border: 1px solid currentColor; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white">

    <!-- Sticky progress header -->
    <header class="sticky top-0 z-20 bg-[#0a0a0a]/95 backdrop-blur border-b border-white/10 px-4 pt-3 pb-2">
        <div class="flex items-end justify-between gap-2">
            <h1 class="fn-title text-2xl leading-none uppercase italic text-yellow-500">Sprite Tracker</h1>
            <span id="stats" class="text-xs font-bold text-gray-300 whitespace-nowrap"></span>
        </div>
        <div class="mt-2 h-2.5 w-full rounded-full bg-white/10 overflow-hidden">
            <div id="progress-bar" class="h-full rounded-full bg-gradient-to-r from-yellow-400 to-orange-500 transition-all duration-500" style="width:0%"></div>
        </div>
    </header>

    <!-- Controls -->
    <div class="px-4 pt-3 space-y-3">
        <button id="install-btn" class="hidden w-full border border-yellow-500 text-yellow-400 py-2.5 rounded-xl text-[12px] font-extrabold uppercase active:bg-yellow-500/10">Add to Home Screen</button>

        <input id="search" type="search" inputmode="search" placeholder="Search sprites…"
            class="w-full bg-[#1a1a1a] border border-[#2e2e2e] rounded-xl px-4 py-3 text-sm font-medium placeholder-gray-500 focus:outline-none focus:border-yellow-500">

        <div class="flex gap-1 bg-[#141414] p-1 rounded-xl">
            <button class="seg-btn active" data-status="all">All</button>
            <button class="seg-btn" data-status="owned">Owned</button>
            <button class="seg-btn" data-status="missing">Missing</button>
        </div>

        <div class="flex gap-2">
            <select id="sort" class="flex-1 bg-[#1a1a1a] border border-[#2e2e2e] rounded-xl px-3 py-2.5 text-[12px] font-bold focus:outline-none focus:border-yellow-500">
                <option value="default">Sort: Default</option>
                <option value="name">Sort: A–Z</option>
                <option value="rarity">Sort: Rarity</option>
                <option value="owned">Sort: Owned first</option>
                <option value="missing">Sort: Missing first</option>
            </select>
            <div class="flex gap-1 bg-[#141414] p-1 rounded-xl">
                <button class="seg-btn active px-4" data-view="grid">Grid</button>
                <button class="seg-btn px-4" data-view="sets">Sets</button>
            </div>
        </div>

        <!-- Per-rarity progress rings (tap to filter) -->
        <div id="rings" class="flex gap-2 overflow-x-auto no-scrollbar -mx-1 px-1 pb-1"></div>
        <p id="nudge" class="text-[11px] font-bold text-gray-400 text-center"></p>

        <div class="grid grid-cols-3 gap-2">
            <button onclick="saveToPhotos()" class="bg-blue-600 active:bg-blue-700 py-2.5 rounded-xl text-[11px] font-extrabold uppercase">Save Image</button>
            <button onclick="openBackup()" class="bg-[#1f1f1f] border border-[#2e2e2e] active:bg-[#262626] py-2.5 rounded-xl text-[11px] font-extrabold uppercase">Sync / Backup</button>
            <button onclick="resetAll()" class="bg-[#1f1f1f] border border-[#2e2e2e] text-red-400 active:bg-[#262626] py-2.5 rounded-xl text-[11px] font-extrabold uppercase">Reset</button>
        </div>
    </div>

    <!-- Grid / Sets (also used for the exported image) -->
    <div id="capture-wrapper" class="px-3 pt-4 pb-12">
        <div class="text-center mb-3">
            <h2 class="fn-title text-xl uppercase italic text-yellow-500">My Sprite Collection</h2>
            <p id="export-stats" class="text-[10px] font-bold text-gray-400"></p>
        </div>
        <div id="grid"></div>
        <p id="empty" class="hidden text-center text-gray-500 text-sm py-12">No sprites match your filters.</p>
        <p class="text-center text-gray-600 text-[10px] mt-6">Tap a sprite to toggle • long-press to preview</p>
    </div>

    <!-- Sync / Backup modal -->
    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center">
        <div class="absolute inset-0 bg-black/70" onclick="closeBackup()"></div>
        <div class="relative w-full sm:max-w-md bg-[#141414] border border-[#2e2e2e] rounded-t-2xl sm:rounded-2xl p-5 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-1">
                <h3 class="fn-title text-xl uppercase italic text-yellow-500">Sync &amp; Backup</h3>
                <button onclick="closeBackup()" class="text-gray-400 text-2xl leading-none px-2">&times;</button>
            </div>
            <p class="text-[11px] text-gray-400 mb-4">No account needed. Copy your code or share link to move your collection to another phone.</p>

            <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Share link</label>
            <div class="flex gap-2 mb-4">
                <input id="share-link" readonly class="flex-1 bg-[#0a0a0a] border border-[#2e2e2e] rounded-lg px-3 py-2 text-xs text-gray-300 truncate">
                <button onclick="copyEl('share-link', this)" class="bg-blue-600 px-3 rounded-lg text-[11px] font-extrabold uppercase">Copy</button>
            </div>

            <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Backup code (paste here to restore)</label>
            <textarea id="backup-code" rows="4" class="w-full bg-[#0a0a0a] border border-[#2e2e2e] rounded-lg px-3 py-2 text-xs text-gray-300 break-all mb-3"></textarea>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="copyEl('backup-code', this)" class="bg-blue-600 py-2.5 rounded-lg text-[11px] font-extrabold uppercase">Copy code</button>
                <button onclick="doRestore()" class="bg-green-600 py-2.5 rounded-lg text-[11px] font-extrabold uppercase">Restore</button>
            </div>
            <p id="modal-msg" class="text-[11px] text-center mt-3 h-4"></p>
        </div>
    </div>

    <!-- Sprite preview modal (long-press) -->
    <div id="preview" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/80" onclick="closePreview()"></div>
        <div class="relative w-full max-w-xs bg-[#141414] border border-[#2e2e2e] rounded-2xl p-5 text-center">
            <button onclick="closePreview()" class="absolute top-2 right-3 text-gray-400 text-2xl leading-none">&times;</button>
            <img id="pv-img" alt="" class="w-40 h-40 mx-auto object-contain mb-3">
            <h3 id="pv-name" class="fn-title text-2xl uppercase italic text-white leading-none"></h3>
            <p id="pv-rarity" class="mb-1"></p>
            <p id="pv-status" class="text-xs text-gray-400 mb-4"></p>
            <button id="pv-toggle" onclick="previewToggle()" class="w-full py-3 rounded-xl text-sm font-extrabold uppercase bg-green-600"></button>
        </div>
    </div>

    <script>
        const spriteData = [
            { file: "Water_Sprite.JPG", rarity: "Rare" }, { file: "Gold_Water_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Water_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Water_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Water_Sprite.JPG", rarity: "Special" },
            { file: "Earth_Sprite.JPG", rarity: "Rare" }, { file: "Gold_Earth_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Earth_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Earth_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Earth_Sprite.JPG", rarity: "Special" },
            { file: "Fire_Sprite.JPG", rarity: "Rare" }, { file: "Gold_Fire_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Fire_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Fire_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Fire_Sprite.JPG", rarity: "Special" },
            { file: "Duck_Sprite.JPG", rarity: "Epic" }, { file: "Gold_Duck_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Duck_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Duck_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Duck_Sprite.JPG", rarity: "Special" },
            { file: "Ghost_Sprite.JPG", rarity: "Epic" }, { file: "Gold_Ghost_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Ghost_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Ghost_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Ghost_Sprite.JPG", rarity: "Special" },
            { file: "Dream_Sprite.JPG", rarity: "Legendary" }, { file: "Gold_Dream_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Dream_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Dream_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Dream_Sprite.JPG", rarity: "Special" },
            { file: "Demon_Sprite.JPG", rarity: "Epic" }, { file: "Gold_Demon_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Demon_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Demon_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Demon_Sprite.JPG", rarity: "Special" },
            { file: "Punk_Sprite.JPG", rarity: "Legendary" }, { file: "Gold_Punk_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Punk_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Punk_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Punk_Sprite.JPG", rarity: "Special" },
            { file: "King_Sprite.JPG", rarity: "Epic" }, { file: "Gold_King_Sprite.JPG", rarity: "Special" }, { file: "Gummy_King_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_King_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_King_Sprite.JPG", rarity: "Special" },
            { file: "Burnt_Peanut.JPG", rarity: "Mythic" }, { file: "Zero_Point_Sprite.JPG", rarity: "Mythic" }, { file: "Gold_Zero_Point_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Zero_Point_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Zero_Point_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Zero_Point_Sprite.JPG", rarity: "Special" },
            { file: "Fishy_Sprite.JPG", rarity: "Rare" }, { file: "Gold_Fishy_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Fishy_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Fishy_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Fishy_Sprite.JPG", rarity: "Special" },
            { file: "Striker_Sprite.JPG", rarity: "Epic" }, { file: "Gold_Striker_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Striker_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Striker_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Striker_Sprite.JPG", rarity: "Special" },
            { file: "Aura_Sprite.JPG", rarity: "Epic" }, { file: "Gold_Aura_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Aura_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Aura_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Aura_Sprite.JPG", rarity: "Special" },
            { file: "Boss_Sprite.JPG", rarity: "Legendary" }, { file: "Gold_Boss_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Boss_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Boss_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Boss_Sprite.JPG", rarity: "Special" },
            { file: "Grim_Sprite.JPG", rarity: "Mythic" }, { file: "Gold_Grim_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Grim_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Grim_Sprite.JPG", rarity: "Special" }, { file: "Holofoil_Grim_Sprite.JPG", rarity: "Special" }
        ];

        const STORAGE_KEY = 'fnSpriteTracker61';
        const RARITIES = ['Rare', 'Epic', 'Legendary', 'Mythic', 'Special'];
        const RARITY_RANK = { Rare: 0, Epic: 1, Legendary: 2, Mythic: 3, Special: 4 };
        const RARITY_COLOR = { Rare: '#3b82f6', Epic: '#a855f7', Legendary: '#eab308', Mythic: '#f97316', Special: '#e5e7eb' };
        const VARIANT_ORDER = { Base: 0, Gold: 1, Gummy: 2, Galaxy: 3, Holofoil: 4 };
        const RING_C = 2 * Math.PI * 18; // circumference for r=18

        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        let filter = { search: '', status: 'all', rarity: 'all', sort: 'default' };
        let view = 'grid';
        let previewFile = null;

        const prettyName = f => f.replace('.JPG', '').replace(/_/g, ' ');
        const prettyFamily = key => prettyName(key + '.JPG').replace(/ Sprite$/, '');
        const isOwned = f => !!state[f];
        const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

        // Build sprite families (base + Gold/Gummy/Galaxy/Holofoil variants).
        spriteData.forEach((item, i) => { item._i = i; });
        const families = [];
        const familyIndex = {};
        spriteData.forEach(item => {
            const key = item.file.replace('.JPG', '').replace(/^(Gold|Gummy|Galaxy|Holofoil)_/, '');
            if (!(key in familyIndex)) {
                familyIndex[key] = families.length;
                families.push({ key, name: prettyFamily(key), baseRarity: null, members: [], _i: families.length });
            }
            const fam = families[familyIndex[key]];
            const m = item.file.match(/^(Gold|Gummy|Galaxy|Holofoil)_/);
            const variant = m ? m[1] : 'Base';
            fam.members.push(Object.assign({ variant }, item));
            if (variant === 'Base') fam.baseRarity = item.rarity;
        });
        families.forEach(f => f.members.sort((a, b) => VARIANT_ORDER[a.variant] - VARIANT_ORDER[b.variant]));

        function playSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.connect(ctx.destination);
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch (e) { /* audio not available */ }
        }

        /* ---------- Filtering / sorting ---------- */
        function matchesFilters(item, familyName) {
            const q = filter.search.trim().toLowerCase();
            if (q) {
                const hay = (familyName ? familyName + ' ' : '') + prettyName(item.file);
                if (!hay.toLowerCase().includes(q)) return false;
            }
            if (filter.status === 'owned' && !isOwned(item.file)) return false;
            if (filter.status === 'missing' && isOwned(item.file)) return false;
            if (filter.rarity !== 'all' && item.rarity !== filter.rarity) return false;
            return true;
        }

        function sortList(list) {
            const s = filter.sort, arr = list.slice();
            if (s === 'name') arr.sort((a, b) => prettyName(a.file).localeCompare(prettyName(b.file)));
            else if (s === 'rarity') arr.sort((a, b) => (RARITY_RANK[a.rarity] - RARITY_RANK[b.rarity]) || a._i - b._i);
            else if (s === 'owned') arr.sort((a, b) => (Number(isOwned(b.file)) - Number(isOwned(a.file))) || a._i - b._i);
            else if (s === 'missing') arr.sort((a, b) => (Number(isOwned(a.file)) - Number(isOwned(b.file))) || a._i - b._i);
            return arr;
        }

        function sortFamilies(list) {
            const s = filter.sort, arr = list.slice();
            const comp = f => f.members.filter(m => isOwned(m.file)).length / f.members.length;
            if (s === 'name') arr.sort((a, b) => a.name.localeCompare(b.name));
            else if (s === 'rarity') arr.sort((a, b) => (RARITY_RANK[a.baseRarity] - RARITY_RANK[b.baseRarity]) || a._i - b._i);
            else if (s === 'owned') arr.sort((a, b) => (comp(b) - comp(a)) || a._i - b._i);
            else if (s === 'missing') arr.sort((a, b) => (comp(a) - comp(b)) || a._i - b._i);
            return arr;
        }

        /* ---------- Long-press handling ---------- */
        let pressTimer = null, longPressFired = false;
        function bindPress(el, file) {
            let sx = 0, sy = 0;
            el.addEventListener('pointerdown', e => {
                longPressFired = false;
                sx = e.clientX; sy = e.clientY;
                pressTimer = setTimeout(() => { longPressFired = true; openPreview(file); }, 450);
            });
            el.addEventListener('pointermove', e => {
                if (Math.abs(e.clientX - sx) > 10 || Math.abs(e.clientY - sy) > 10) clearTimeout(pressTimer);
            });
            const cancel = () => clearTimeout(pressTimer);
            el.addEventListener('pointerup', cancel);
            el.addEventListener('pointerleave', cancel);
            el.addEventListener('pointercancel', cancel);
            el.addEventListener('contextmenu', e => e.preventDefault());
            el.onclick = () => {
                if (longPressFired) { longPressFired = false; return; }
                toggle(file);
            };
        }

        /* ---------- Card builder ---------- */
        function createCard(item, label) {
            const owned = isOwned(item.file);
            const name = prettyName(item.file);
            const card = document.createElement('button');
            card.type = 'button';
            card.setAttribute('aria-pressed', owned);
            card.className = `sprite-card col-${item.rarity} relative p-2 rounded-lg text-center w-full ${owned ? 'is-owned' : 'is-missing'}`;
            card.innerHTML = `
                ${owned ? '<span class="check-badge">&#10003;</span>' : ''}
                <img src="images/${item.file}" alt="${name}" loading="lazy" class="sprite-img w-full aspect-square object-contain">
                <p class="text-[9px] font-bold mt-1 truncate text-white">${label || name}</p>
                <p class="text-[7px] uppercase font-bold">${item.rarity}</p>
                <span class="status-pill ${owned ? 'bg-green-600' : 'bg-gray-700'}">${owned ? 'Owned' : 'Tap to add'}</span>`;
            bindPress(card, item.file);
            return card;
        }

        /* ---------- Renderers ---------- */
        function renderGrid(grid) {
            grid.className = 'grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 gap-2';
            const visible = sortList(spriteData.filter(it => matchesFilters(it)));
            visible.forEach(item => grid.appendChild(createCard(item)));
            return visible.length;
        }

        function renderSets(grid) {
            grid.className = 'space-y-3';
            let fams = families.filter(f => f.members.some(m => matchesFilters(m, f.name)));
            fams = sortFamilies(fams);
            fams.forEach(fam => {
                const ownedCount = fam.members.filter(m => isOwned(m.file)).length;
                const complete = ownedCount === fam.members.length;
                const block = document.createElement('div');
                block.className = `set-card ${complete ? 'complete' : ''}`;

                const head = document.createElement('div');
                head.className = 'flex items-center justify-between mb-2';
                head.innerHTML = `
                    <div class="flex items-center gap-2 min-w-0">
                        <span class="fn-title text-lg uppercase italic truncate">${fam.name}</span>
                        <span class="rarity-badge col-${fam.baseRarity}">${fam.baseRarity}</span>
                    </div>
                    <span class="text-[10px] font-extrabold whitespace-nowrap ${complete ? 'text-yellow-400' : 'text-gray-400'}">${complete ? 'COMPLETE &#10003;' : ownedCount + ' / ' + fam.members.length}</span>`;
                block.appendChild(head);

                const row = document.createElement('div');
                row.className = 'grid grid-cols-3 sm:grid-cols-5 gap-2';
                fam.members.filter(m => matchesFilters(m, fam.name)).forEach(m => row.appendChild(createCard(m, m.variant)));
                block.appendChild(row);
                grid.appendChild(block);
            });
            return fams.length;
        }

        function renderRings() {
            const total = spriteData.length;
            const ownedAll = spriteData.filter(s => isOwned(s.file)).length;
            let html = `
                <button class="ring-btn all ${filter.rarity === 'all' ? 'active' : ''}" data-rarity="all">
                    <span class="ring-all-circle">All</span>
                    <span class="ring-name">All</span>
                    <span class="ring-count">${ownedAll}/${total}</span>
                </button>`;
            RARITIES.forEach(r => {
                const t = spriteData.filter(s => s.rarity === r).length;
                const o = spriteData.filter(s => s.rarity === r && isOwned(s.file)).length;
                const off = RING_C * (1 - (t ? o / t : 0));
                html += `
                    <button class="ring-btn ${filter.rarity === r ? 'active' : ''}" data-rarity="${r}">
                        <svg width="46" height="46" viewBox="0 0 44 44">
                            <circle cx="22" cy="22" r="18" fill="none" stroke="#2a2a2a" stroke-width="4"/>
                            <circle cx="22" cy="22" r="18" fill="none" stroke="${RARITY_COLOR[r]}" stroke-width="4" stroke-linecap="round"
                                stroke-dasharray="${RING_C.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" transform="rotate(-90 22 22)"/>
                            <text x="22" y="26" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">${o}</text>
                        </svg>
                        <span class="ring-name">${r}</span>
                        <span class="ring-count">${o}/${t}</span>
                    </button>`;
            });
            document.getElementById('rings').innerHTML = html;
        }

        function computeNudge() {
            let best = null;
            RARITIES.forEach(r => {
                const t = spriteData.filter(s => s.rarity === r).length;
                const o = spriteData.filter(s => s.rarity === r && isOwned(s.file)).length;
                if (o < t) {
                    const pct = o / t;
                    if (!best || pct > best.pct) best = { r, o, t, pct, left: t - o };
                }
            });
            if (!best) return 'Collection complete — every sprite owned!';
            return `Closest tier: ${best.r} ${best.o}/${best.t} — ${best.left} to go (${Math.round(best.pct * 100)}%)`;
        }

        function render() {
            const owned = spriteData.filter(s => isOwned(s.file)).length;
            const pct = Math.round((owned / spriteData.length) * 100);
            const stats = `${owned} / ${spriteData.length} (${pct}%)`;
            document.getElementById('stats').innerText = stats;
            document.getElementById('export-stats').innerText = stats + ' Collected';
            document.getElementById('progress-bar').style.width = pct + '%';
            renderRings();
            document.getElementById('nudge').innerText = computeNudge();

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const count = view === 'grid' ? renderGrid(grid) : renderSets(grid);
            document.getElementById('empty').classList.toggle('hidden', count > 0);
        }

        function toggle(id) {
            state[id] = !state[id];
            save();
            if (state[id]) {
                if (navigator.vibrate) navigator.vibrate(40);
                playSound();
            }
            render();
        }

        /* ---------- Preview modal ---------- */
        function openPreview(file) {
            previewFile = file;
            renderPreview();
            document.getElementById('preview').classList.remove('hidden');
            if (navigator.vibrate) navigator.vibrate(15);
        }
        function closePreview() { document.getElementById('preview').classList.add('hidden'); }
        function renderPreview() {
            const item = spriteData.find(s => s.file === previewFile);
            if (!item) return;
            const owned = isOwned(item.file);
            document.getElementById('pv-img').src = 'images/' + item.file;
            document.getElementById('pv-name').innerText = prettyName(item.file);
            const rr = document.getElementById('pv-rarity');
            rr.innerText = item.rarity;
            rr.className = 'text-xs uppercase font-extrabold mb-1 col-' + item.rarity;
            document.getElementById('pv-status').innerText = owned ? 'In your collection' : 'Not collected yet';
            const t = document.getElementById('pv-toggle');
            t.innerText = owned ? 'Mark as not owned' : 'Mark as owned';
            t.className = 'w-full py-3 rounded-xl text-sm font-extrabold uppercase ' + (owned ? 'bg-gray-700' : 'bg-green-600');
        }
        function previewToggle() { toggle(previewFile); renderPreview(); }

        /* ---------- Controls wiring ---------- */
        function setActive(selector, btn) {
            document.querySelectorAll(selector).forEach(b => b.classList.toggle('active', b === btn));
        }
        document.getElementById('search').addEventListener('input', e => { filter.search = e.target.value; render(); });
        document.getElementById('sort').addEventListener('change', e => { filter.sort = e.target.value; render(); });
        document.querySelectorAll('[data-status]').forEach(b => b.addEventListener('click', () => { filter.status = b.dataset.status; setActive('[data-status]', b); render(); }));
        document.querySelectorAll('[data-view]').forEach(b => b.addEventListener('click', () => { view = b.dataset.view; setActive('[data-view]', b); render(); }));
        document.getElementById('rings').addEventListener('click', e => {
            const btn = e.target.closest('[data-rarity]');
            if (!btn) return;
            filter.rarity = btn.dataset.rarity;
            render();
        });
        // Suppress the native long-press callout app-wide (keep it for text fields so paste works).
        document.addEventListener('contextmenu', e => {
            if (e.target.closest('input, textarea')) return;
            e.preventDefault();
        });

        /* ---------- Reset ---------- */
        function resetAll() {
            if (confirm('Reset your whole collection? This cannot be undone.')) {
                state = {};
                save();
                render();
            }
        }

        /* ---------- Sync / Backup ---------- */
        function getBackupCode() {
            const owned = spriteData.filter(s => isOwned(s.file)).map(s => s.file);
            return btoa(unescape(encodeURIComponent(JSON.stringify(owned))));
        }
        function applyBackupCode(code) {
            try {
                const arr = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
                if (!Array.isArray(arr)) return false;
                const next = {};
                arr.forEach(f => { if (typeof f === 'string') next[f] = true; });
                state = next;
                save();
                render();
                return true;
            } catch (e) { return false; }
        }
        function openBackup() {
            const code = getBackupCode();
            document.getElementById('backup-code').value = code;
            document.getElementById('share-link').value = location.origin + location.pathname + '#code=' + encodeURIComponent(code);
            document.getElementById('modal-msg').innerText = '';
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeBackup() { document.getElementById('modal').classList.add('hidden'); }
        function copyEl(id, btn) {
            const el = document.getElementById(id);
            el.select();
            navigator.clipboard.writeText(el.value).then(() => {
                const old = btn.innerText;
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = old, 1200);
            }).catch(() => { document.execCommand('copy'); });
        }
        function doRestore() {
            const msg = document.getElementById('modal-msg');
            if (applyBackupCode(document.getElementById('backup-code').value)) {
                msg.className = 'text-[11px] text-center mt-3 h-4 text-green-400';
                msg.innerText = 'Collection restored!';
                setTimeout(closeBackup, 900);
            } else {
                msg.className = 'text-[11px] text-center mt-3 h-4 text-red-400';
                msg.innerText = 'Invalid backup code.';
            }
        }

        /* ---------- Save Image ---------- */
        function saveToPhotos() {
            const wrapper = document.getElementById('capture-wrapper');
            const prevWidth = wrapper.style.width;
            wrapper.style.width = "900px";
            html2canvas(wrapper, { backgroundColor: "#0a0a0a", scale: 2, useCORS: true }).then(canvas => {
                wrapper.style.width = prevWidth;
                const newTab = window.open();
                if (newTab) {
                    newTab.document.write(`<img src="${canvas.toDataURL("image/png")}" style="width:100%">`);
                } else {
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL("image/png");
                    a.download = 'my-sprite-collection.png';
                    a.click();
                }
            });
        }

        /* ---------- Install (Add to Home Screen) ---------- */
        let deferredPrompt = null;
        const installBtn = document.getElementById('install-btn');
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const standalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });
        window.addEventListener('appinstalled', () => installBtn.classList.add('hidden'));
        if (isIOS && !standalone) installBtn.classList.remove('hidden');
        installBtn.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.finally(() => { deferredPrompt = null; installBtn.classList.add('hidden'); });
            } else if (isIOS) {
                alert('To install: tap the Share button, then "Add to Home Screen".');
            } else {
                alert('Open your browser menu and choose "Install app" / "Add to Home Screen".');
            }
        });

        /* ---------- Shared-link import ---------- */
        if (location.hash.startsWith('#code=')) {
            const incoming = decodeURIComponent(location.hash.slice(6));
            if (confirm('Import a shared sprite collection? This replaces your current data.')) {
                applyBackupCode(incoming);
            }
            history.replaceState(null, '', location.pathname);
        }

        /* ---------- PWA service worker ---------- */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }

        render();
    </script>
</body>
</html>
