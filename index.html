<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sprites">
    <title>Fortnite Sprite Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Burbank+Big+Condensed:wght@800&display=swap');
        * { -webkit-tap-highlight-color: transparent; }
        body { padding-bottom: env(safe-area-inset-bottom); }
        .fn-title { font-family: 'Burbank Big Condensed', sans-serif; }

        .sprite-card { background: #1a1a1a; transition: transform .12s ease, box-shadow .12s ease; border-bottom: 4px solid #333; }
        .sprite-card:active { transform: scale(0.95); }
        .sprite-img { transition: filter .2s ease, opacity .2s ease; }
        .is-missing .sprite-img { filter: grayscale(1); opacity: 0.35; }
        .is-owned { box-shadow: inset 0 0 0 2px #16a34a; }
        .check-badge { position: absolute; top: 6px; right: 6px; width: 20px; height: 20px; background: #16a34a; color: #fff; border-radius: 9999px; font-size: 12px; line-height: 20px; font-weight: 800; box-shadow: 0 1px 4px rgba(0,0,0,.5); }
        .status-pill { display: block; margin-top: 4px; padding: 4px 0; font-size: 8px; text-transform: uppercase; font-weight: 800; border-radius: 6px; letter-spacing: .04em; }
        .clicked { animation: pulse 0.3s ease; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        /* Rarity Colors */
        .col-Rare { color: #3b82f6; border-color: #3b82f6; }
        .col-Epic { color: #a855f7; border-color: #a855f7; }
        .col-Legendary { color: #eab308; border-color: #eab308; }
        .col-Mythic { color: #f97316; border-color: #f97316; }
        .col-Special { color: #fde047; border-color: #ffffff; }

        /* Segmented + chip controls */
        .seg-btn, .chip { transition: all .15s ease; }
        .seg-btn { flex: 1; padding: 8px 0; font-size: 11px; font-weight: 800; text-transform: uppercase; border-radius: 8px; color: #9ca3af; }
        .seg-btn.active { background: #eab308; color: #000; }
        .chip { white-space: nowrap; padding: 6px 12px; font-size: 11px; font-weight: 800; text-transform: uppercase; border-radius: 9999px; background: #1f1f1f; color: #9ca3af; border: 1px solid #2e2e2e; }
        .chip.active { background: #fff; color: #000; border-color: #fff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white">

    <!-- Sticky progress header -->
    <header class="sticky top-0 z-20 bg-[#0a0a0a]/95 backdrop-blur border-b border-white/10 px-4 pt-3 pb-2">
        <div class="flex items-end justify-between gap-2">
            <h1 class="fn-title text-2xl leading-none uppercase italic text-yellow-500">Sprite Tracker</h1>
            <span id="stats" class="text-xs font-bold text-gray-300 whitespace-nowrap"></span>
        </div>
        <div class="mt-2 h-2.5 w-full rounded-full bg-white/10 overflow-hidden">
            <div id="progress-bar" class="h-full rounded-full bg-gradient-to-r from-yellow-400 to-orange-500 transition-all duration-500" style="width:0%"></div>
        </div>
    </header>

    <!-- Controls -->
    <div class="px-4 pt-3 space-y-3">
        <input id="search" type="search" inputmode="search" placeholder="Search sprites…"
            class="w-full bg-[#1a1a1a] border border-[#2e2e2e] rounded-xl px-4 py-3 text-sm font-medium placeholder-gray-500 focus:outline-none focus:border-yellow-500">

        <div class="flex gap-1 bg-[#141414] p-1 rounded-xl">
            <button class="seg-btn active" data-status="all">All</button>
            <button class="seg-btn" data-status="owned">Owned</button>
            <button class="seg-btn" data-status="missing">Missing</button>
        </div>

        <div class="flex gap-2 overflow-x-auto no-scrollbar -mx-1 px-1 pb-1">
            <button class="chip active" data-rarity="all">All</button>
            <button class="chip" data-rarity="Rare">Rare</button>
            <button class="chip" data-rarity="Epic">Epic</button>
            <button class="chip" data-rarity="Legendary">Legendary</button>
            <button class="chip" data-rarity="Mythic">Mythic</button>
            <button class="chip" data-rarity="Special">Special</button>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <button onclick="saveToPhotos()" class="bg-blue-600 active:bg-blue-700 py-2.5 rounded-xl text-[11px] font-extrabold uppercase">Save Image</button>
            <button onclick="openBackup()" class="bg-[#1f1f1f] border border-[#2e2e2e] active:bg-[#262626] py-2.5 rounded-xl text-[11px] font-extrabold uppercase">Sync / Backup</button>
            <button onclick="resetAll()" class="bg-[#1f1f1f] border border-[#2e2e2e] text-red-400 active:bg-[#262626] py-2.5 rounded-xl text-[11px] font-extrabold uppercase">Reset</button>
        </div>
    </div>

    <!-- Grid (also used for the exported image) -->
    <div id="capture-wrapper" class="px-3 pt-4 pb-12">
        <div class="text-center mb-3">
            <h2 class="fn-title text-xl uppercase italic text-yellow-500">My Sprite Collection</h2>
            <p id="export-stats" class="text-[10px] font-bold text-gray-400"></p>
        </div>
        <div id="grid" class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 gap-2"></div>
        <p id="empty" class="hidden text-center text-gray-500 text-sm py-12">No sprites match your filters.</p>
    </div>

    <!-- Sync / Backup modal -->
    <div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center">
        <div class="absolute inset-0 bg-black/70" onclick="closeBackup()"></div>
        <div class="relative w-full sm:max-w-md bg-[#141414] border border-[#2e2e2e] rounded-t-2xl sm:rounded-2xl p-5 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-1">
                <h3 class="fn-title text-xl uppercase italic text-yellow-500">Sync &amp; Backup</h3>
                <button onclick="closeBackup()" class="text-gray-400 text-2xl leading-none px-2">&times;</button>
            </div>
            <p class="text-[11px] text-gray-400 mb-4">No account needed. Copy your code or share link to move your collection to another phone.</p>

            <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Share link</label>
            <div class="flex gap-2 mb-4">
                <input id="share-link" readonly class="flex-1 bg-[#0a0a0a] border border-[#2e2e2e] rounded-lg px-3 py-2 text-xs text-gray-300 truncate">
                <button onclick="copyEl('share-link', this)" class="bg-blue-600 px-3 rounded-lg text-[11px] font-extrabold uppercase">Copy</button>
            </div>

            <label class="block text-[10px] font-bold uppercase text-gray-500 mb-1">Backup code (paste here to restore)</label>
            <textarea id="backup-code" rows="4" class="w-full bg-[#0a0a0a] border border-[#2e2e2e] rounded-lg px-3 py-2 text-xs text-gray-300 break-all mb-3"></textarea>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="copyEl('backup-code', this)" class="bg-blue-600 py-2.5 rounded-lg text-[11px] font-extrabold uppercase">Copy code</button>
                <button onclick="doRestore()" class="bg-green-600 py-2.5 rounded-lg text-[11px] font-extrabold uppercase">Restore</button>
            </div>
            <p id="modal-msg" class="text-[11px] text-center mt-3 h-4"></p>
        </div>
    </div>

    <script>
        const spriteData = [
            { file: "Water_Sprite.JPG", rarity: "Rare" }, { file: "Gold_Water_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Water_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Water_Sprite.JPG", rarity: "Special" },
            { file: "Earth_Sprite.JPG", rarity: "Rare" }, { file: "Gold_Earth_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Earth_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Earth_Sprite.JPG", rarity: "Special" },
            { file: "Fire_Sprite.JPG", rarity: "Rare" }, { file: "Gold_Fire_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Fire_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Fire_Sprite.JPG", rarity: "Special" },
            { file: "Duck_Sprite.JPG", rarity: "Epic" }, { file: "Gold_Duck_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Duck_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Duck_Sprite.JPG", rarity: "Special" },
            { file: "Ghost_Sprite.JPG", rarity: "Epic" }, { file: "Gold_Ghost_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Ghost_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Ghost_Sprite.JPG", rarity: "Special" },
            { file: "Dream_Sprite.JPG", rarity: "Legendary" }, { file: "Gold_Dream_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Dream_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Dream_Sprite.JPG", rarity: "Special" },
            { file: "Demon_Sprite.JPG", rarity: "Epic" }, { file: "Gold_Demon_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Demon_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Demon_Sprite.JPG", rarity: "Special" },
            { file: "Punk_Sprite.JPG", rarity: "Legendary" }, { file: "Gold_Punk_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Punk_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Punk_Sprite.JPG", rarity: "Special" },
            { file: "King_Sprite.JPG", rarity: "Epic" }, { file: "Gold_King_Sprite.JPG", rarity: "Special" }, { file: "Gummy_King_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_King_Sprite.JPG", rarity: "Special" },
            { file: "Burnt_Peanut.JPG", rarity: "Mythic" }, { file: "Zero_Point_Sprite.JPG", rarity: "Mythic" }, { file: "Gold_Zero_Point_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Zero_Point_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Zero_Point_Sprite.JPG", rarity: "Special" },
            { file: "Fishy_Sprite.JPG", rarity: "Rare" }, { file: "Gold_Fishy_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Fishy_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Fishy_Sprite.JPG", rarity: "Special" },
            { file: "Striker_Sprite.JPG", rarity: "Epic" }, { file: "Gold_Striker_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Striker_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Striker_Sprite.JPG", rarity: "Special" },
            { file: "Aura_Sprite.JPG", rarity: "Epic" }, { file: "Gold_Aura_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Aura_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Aura_Sprite.JPG", rarity: "Special" },
            { file: "Boss_Sprite.JPG", rarity: "Legendary" }, { file: "Gold_Boss_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Boss_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Boss_Sprite.JPG", rarity: "Special" },
            { file: "Grim_Sprite.JPG", rarity: "Mythic" }, { file: "Gold_Grim_Sprite.JPG", rarity: "Special" }, { file: "Gummy_Grim_Sprite.JPG", rarity: "Special" }, { file: "Galaxy_Grim_Sprite.JPG", rarity: "Special" }
        ];

        const STORAGE_KEY = 'fnSpriteTracker61';
        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        let filter = { search: '', status: 'all', rarity: 'all' };

        const prettyName = f => f.replace('.JPG', '').replace(/_/g, ' ');

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

        function playSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.connect(ctx.destination);
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch (e) { /* audio not available */ }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const ownedCount = spriteData.filter(s => state[s.file]).length;
            const pct = Math.round((ownedCount / spriteData.length) * 100);
            const statsText = `${ownedCount} / ${spriteData.length} (${pct}%)`;
            document.getElementById('stats').innerText = statsText;
            document.getElementById('export-stats').innerText = statsText + ' Collected';
            document.getElementById('progress-bar').style.width = pct + '%';

            const q = filter.search.trim().toLowerCase();
            const visible = spriteData.filter(item => {
                if (q && !prettyName(item.file).toLowerCase().includes(q)) return false;
                if (filter.status === 'owned' && !state[item.file]) return false;
                if (filter.status === 'missing' && state[item.file]) return false;
                if (filter.rarity !== 'all' && item.rarity !== filter.rarity) return false;
                return true;
            });

            document.getElementById('empty').classList.toggle('hidden', visible.length > 0);

            visible.forEach(item => {
                const owned = !!state[item.file];
                const name = prettyName(item.file);
                const card = document.createElement('button');
                card.type = 'button';
                card.setAttribute('aria-pressed', owned);
                card.onclick = () => toggle(item.file);
                card.className = `sprite-card col-${item.rarity} relative p-2 rounded-lg text-center w-full ${owned ? 'is-owned' : 'is-missing'}`;
                card.innerHTML = `
                    ${owned ? '<span class="check-badge">&#10003;</span>' : ''}
                    <img src="images/${item.file}" alt="${name}" loading="lazy" class="sprite-img w-full aspect-square object-contain">
                    <p class="text-[9px] font-bold mt-1 truncate text-white">${name}</p>
                    <p class="text-[7px] uppercase font-bold">${item.rarity}</p>
                    <span class="status-pill ${owned ? 'bg-green-600' : 'bg-gray-700'}">${owned ? 'Owned' : 'Tap to add'}</span>
                `;
                grid.appendChild(card);
            });
        }

        function toggle(id) {
            state[id] = !state[id];
            save();
            if (state[id]) {
                if (navigator.vibrate) navigator.vibrate(40);
                playSound();
            }
            render();
        }

        /* ---- Filters ---- */
        document.getElementById('search').addEventListener('input', e => {
            filter.search = e.target.value;
            render();
        });
        document.querySelectorAll('[data-status]').forEach(btn => {
            btn.addEventListener('click', () => {
                filter.status = btn.dataset.status;
                document.querySelectorAll('[data-status]').forEach(b => b.classList.toggle('active', b === btn));
                render();
            });
        });
        document.querySelectorAll('[data-rarity]').forEach(btn => {
            btn.addEventListener('click', () => {
                filter.rarity = btn.dataset.rarity;
                document.querySelectorAll('[data-rarity]').forEach(b => b.classList.toggle('active', b === btn));
                render();
            });
        });

        /* ---- Reset ---- */
        function resetAll() {
            if (confirm('Reset your whole collection? This cannot be undone.')) {
                state = {};
                save();
                render();
            }
        }

        /* ---- Sync / Backup ---- */
        function getBackupCode() {
            const owned = spriteData.filter(s => state[s.file]).map(s => s.file);
            return btoa(unescape(encodeURIComponent(JSON.stringify(owned))));
        }

        function applyBackupCode(code) {
            try {
                const arr = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
                if (!Array.isArray(arr)) return false;
                const next = {};
                arr.forEach(f => { if (typeof f === 'string') next[f] = true; });
                state = next;
                save();
                render();
                return true;
            } catch (e) { return false; }
        }

        function openBackup() {
            const code = getBackupCode();
            document.getElementById('backup-code').value = code;
            document.getElementById('share-link').value = location.origin + location.pathname + '#code=' + encodeURIComponent(code);
            document.getElementById('modal-msg').innerText = '';
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeBackup() { document.getElementById('modal').classList.add('hidden'); }

        function copyEl(id, btn) {
            const el = document.getElementById(id);
            el.select();
            navigator.clipboard.writeText(el.value).then(() => {
                const old = btn.innerText;
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = old, 1200);
            }).catch(() => {
                document.execCommand('copy');
            });
        }

        function doRestore() {
            const code = document.getElementById('backup-code').value;
            const msg = document.getElementById('modal-msg');
            if (applyBackupCode(code)) {
                msg.className = 'text-[11px] text-center mt-3 h-4 text-green-400';
                msg.innerText = 'Collection restored!';
                setTimeout(closeBackup, 900);
            } else {
                msg.className = 'text-[11px] text-center mt-3 h-4 text-red-400';
                msg.innerText = 'Invalid backup code.';
            }
        }

        /* ---- Save Image ---- */
        function saveToPhotos() {
            const wrapper = document.getElementById('capture-wrapper');
            const prevWidth = wrapper.style.width;
            wrapper.style.width = "900px";
            html2canvas(wrapper, { backgroundColor: "#0a0a0a", scale: 2, useCORS: true }).then(canvas => {
                wrapper.style.width = prevWidth;
                const newTab = window.open();
                if (newTab) {
                    newTab.document.write(`<img src="${canvas.toDataURL("image/png")}" style="width:100%">`);
                } else {
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL("image/png");
                    a.download = 'my-sprite-collection.png';
                    a.click();
                }
            });
        }

        /* ---- Shared-link import ---- */
        if (location.hash.startsWith('#code=')) {
            const incoming = decodeURIComponent(location.hash.slice(6));
            if (confirm('Import a shared sprite collection? This replaces your current data.')) {
                applyBackupCode(incoming);
            }
            history.replaceState(null, '', location.pathname);
        }

        /* ---- PWA service worker ---- */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }

        render();
    </script>
</body>
</html>
