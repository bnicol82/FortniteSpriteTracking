<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Sprite Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Burbank+Big+Condensed:wght@800&display=swap');
        .fn-title { font-family: 'Burbank Big Condensed', sans-serif; }
        .sprite-card { background: linear-gradient(145deg, #262626, #171717); transition: all 0.2s ease; }
        @keyframes pulse-once { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .clicked { animation: pulse-once 0.4s ease; background-color: #16a34a !important; }
        .rarity-Rare { border-bottom: 4px solid #22c55e; }
        .rarity-Epic { border-bottom: 4px solid #3b82f6; }
        .rarity-Legendary { border-bottom: 4px solid #a855f7; }
        .rarity-Mythic { border-bottom: 4px solid #f97316; }
        .rarity-Special { border-bottom: 4px solid #eab308; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white">

    <div class="p-4 flex gap-2">
        <button onclick="saveToPhotos()" class="bg-blue-600 px-4 py-2 rounded text-xs font-bold">SAVE IMAGE</button>
    </div>

    <div id="capture-wrapper" class="p-4">
        <header class="mb-6 text-center">
            <h1 class="fn-title text-4xl uppercase italic text-yellow-500">Fortnite Sprite Tracker</h1>
            <p class="text-xs font-bold text-gray-400" id="stats">0 / 61 Collected (0%)</p>
        </header>
        <!-- Grid optimized for mobile -->
        <div id="grid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-3"></div>
    </div>

    <script>
        // Updated data with rarity labels
        const spriteData = [
            { file: "Water_Sprite.JPG", rarity: "Rare" }, { file: "Gold_Water_Sprite.JPG", rarity: "Special" },
            { file: "Duck_Sprite.JPG", rarity: "Epic" }, { file: "Dream_Sprite.JPG", rarity: "Legendary" },
            { file: "Grim_Sprite.JPG", rarity: "Mythic" }
            // ... (ensure your full list is mapped here with correct rarity)
        ];

        let state = JSON.parse(localStorage.getItem('fnSpriteTracker61')) || {};

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let count = 0;
            spriteData.forEach(item => {
                if (state[item.file]) count++;
                const card = document.createElement('div');
                card.className = `sprite-card rarity-${item.rarity} p-2 rounded-lg text-center`;
                card.innerHTML = `
                    <img src="images/${item.file}" class="w-16 h-16 mx-auto object-contain mb-1">
                    <p class="text-[9px] font-bold truncate">${item.file.replace('.JPG', '').replace(/_/g, ' ')}</p>
                    <p class="text-[7px] text-gray-400 uppercase font-bold">${item.rarity}</p>
                    <button id="btn-${item.file}" onclick="toggle('${item.file}')" 
                        class="mt-1 w-full py-1 text-[8px] uppercase font-bold rounded ${state[item.file] ? 'bg-green-600' : 'bg-gray-700'}">
                        ${state[item.file] ? 'Owned' : 'Not Owned'}
                    </button>
                `;
                grid.appendChild(card);
            });
            document.getElementById('stats').innerText = `${count} / ${spriteData.length} Collected (${Math.round((count / spriteData.length) * 100)}%)`;
        }

        function toggle(id) {
            state[id] = !state[id];
            localStorage.setItem('fnSpriteTracker61', JSON.stringify(state));
            const btn = document.getElementById(`btn-${id}`);
            btn.classList.add('clicked'); // Trigger animation
            setTimeout(() => render(), 300);
        }

        function saveToPhotos() {
            // Force container to desktop width for consistent image capture
            const wrapper = document.getElementById('capture-wrapper');
            wrapper.style.width = "800px"; 
            html2canvas(wrapper, { backgroundColor: "#0a0a0a", scale: 2 }).then(canvas => {
                wrapper.style.width = "auto";
                const newTab = window.open();
                newTab.document.write(`<img src="${canvas.toDataURL("image/png")}" style="width:100%">`);
            });
        }
        render();
    </script>
</body>
</html>
