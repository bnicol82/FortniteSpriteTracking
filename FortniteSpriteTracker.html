<!DOCTYPE html>
<html lang="en">

    <script>
        tailwind.config = {
            theme: {

            background-color: #262626;
            color: #a3a3a3;
            border: 1px solid #404040;
        }
        .owned-btn:hover {

        }
        .owned-btn.active { 
            background-color: #22c55e !important; 
            color: #ffffff; 
            border-color: #16a34a;
